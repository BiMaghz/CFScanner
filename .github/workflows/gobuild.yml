name: GoBuild

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: GoReleaser Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so GoReleaser can generate changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: golang/go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: golang
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}